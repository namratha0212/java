name: java-app
on: 
  push:

jobs:
  build:
    strategy:
      matrix:
        environment: ["beta","gamma","delta"]
        versio: [17,21]
        os: ["ubuntu-latest","windows-latest"]
    runs-on: ubuntu-latest

    steps:
      - name: cloning
        uses: actions/checkout@v7.0.0

      - name: install
        uses: actions/setup-java@v5.5.0
        with:
          java-version: ${{ matrix.os }}
          distribution: 'temurin'

      - name: compile
        run: javac Test.java

      - name: environment
        run: echo "${{ matrix.environment }}

      - name: execute java project
        run: java Test

      - name: java version
        run: java --version
      
